[package]
name = "sqlitegraph"
version = "0.1.1"
edition = "2024"
description = "Deterministic, embedded graph database built on SQLite"
license = "GPL-3.0-or-later"
repository = "https://github.com/oldnordic/sqlitegraph"
documentation = "https://docs.rs/sqlitegraph"
readme = "README.md"
keywords = ["graph", "database", "sqlite", "embedded", "deterministic"]
categories = ["database", "data-structures"]

[lib]
name = "sqlitegraph"
path = "src/lib.rs"

[dependencies]
rusqlite = { version = "0.31", features = ["bundled"] }
thiserror = "1"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
bincode = "1.3"
ahash = "0.8"
parking_lot = "0.12"
rand = "0.8"
arc-swap = "1"
bytemuck = { version = "1.13", features = ["derive"] }
binrw = "0.13"
memmap2 = "0.9"

[dev-dependencies]
criterion = { version = "0.5", features = ["html_reports"] }
assert_cmd = "2"
tempfile = "3"
rand = "0.8"


[features]
default = ["sqlite-backend"]
bench-ci = []
sqlite-backend = []
trace_v2_io = []  # STEP 1: Temporary instrumentation for Phase 66 debugging
# Phase 63: V2 is now default behavior for Native backend (no experimental gate)
v1_legacy = []  # Opt-in V1 scattered slot adjacency for compatibility
# DEPRECATED: Compatibility alias - no longer gates behavior
v2_experimental = ["v2_io_exclusive_std"]  # Phase 63: Legacy compatibility alias
# Phase 41: Exclusive I/O modes for corruption isolation
v2_io_exclusive_mmap = []
v2_io_exclusive_std = []

# Phase 13 Step 5: Safe and portable optimization profiles
[profile.release]
# Optimize for performance with portable settings
opt-level = 3
codegen-units = 1
lto = "thin"
debug = false
panic = "abort"

[profile.bench]
# Benchmark profiling with debug symbols for flamegraph analysis
inherits = "release"
opt-level = 3
codegen-units = 1
lto = "thin"
debug = true  # Enable debug symbols for flamegraph profiling

[profile.test]
# Test profile optimized for speed while maintaining debuggability
opt-level = 2
codegen-units = 16
debug = true

# Phase 8 Backend Comparison Benchmarks
[[bench]]
name = "bfs"
harness = false

[[bench]]
name = "k_hop"
harness = false

[[bench]]
name = "insert"
harness = false
