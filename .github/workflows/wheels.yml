name: Wheels

on:
  push:
    branches: [main]
    tags: ["py-v*.*.*"]
  pull_request:
    paths:
      - "sqlitegraph-py/**"
      - "sqlitegraph-core/**"
      - "Cargo.toml"
      - ".github/workflows/wheels.yml"
  workflow_dispatch:

# Security review:
#   This workflow only consumes trusted inputs (matrix values defined here,
#   github.ref for tag gating). No user-controlled fields such as issue
#   titles, PR bodies, or commit messages are interpolated into run: blocks.

permissions:
  contents: read

jobs:
  linux:
    name: linux ${{ matrix.target }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target: [x86_64, aarch64]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build wheel
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: --release --out dist
          working-directory: sqlitegraph-py
          manylinux: "2_28"

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-linux-${{ matrix.target }}
          path: sqlitegraph-py/dist/*.whl
          if-no-files-found: error

  macos:
    name: macos ${{ matrix.target }}
    runs-on: macos-14
    strategy:
      fail-fast: false
      matrix:
        target: [x86_64, aarch64]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build wheel
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: --release --out dist
          working-directory: sqlitegraph-py

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-macos-${{ matrix.target }}
          path: sqlitegraph-py/dist/*.whl
          if-no-files-found: error

  windows:
    name: windows ${{ matrix.target }}
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        target: [x64]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          architecture: ${{ matrix.target }}

      - name: Build wheel
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: --release --out dist
          working-directory: sqlitegraph-py

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-windows-${{ matrix.target }}
          path: sqlitegraph-py/dist/*.whl
          if-no-files-found: error

  sdist:
    name: sdist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist
          working-directory: sqlitegraph-py

      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: sqlitegraph-py/dist/*.tar.gz
          if-no-files-found: error

  test-release:
    name: publish to TestPyPI
    runs-on: ubuntu-latest
    needs: [linux, macos, windows, sdist]
    # Every `py-v*` tag (RC or final) lands on TestPyPI as a smoke test in
    # parallel with the real PyPI publish. workflow_dispatch can also be
    # used to retrigger a TestPyPI-only publish for an already-shipped tag.
    if: startsWith(github.ref, 'refs/tags/py-v') || github.event_name == 'workflow_dispatch'
    environment:
      name: testpypi
      url: https://test.pypi.org/p/sqlitegraph
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          skip-existing: true

  release:
    name: publish to PyPI
    runs-on: ubuntu-latest
    needs: [linux, macos, windows, sdist]
    # Production tags only — anything with `-rc` is excluded, and
    # workflow_dispatch never re-publishes to the production index
    # (the TestPyPI step above is the retrigger path).
    if: startsWith(github.ref, 'refs/tags/py-v') && !contains(github.ref, '-rc') && github.event_name != 'workflow_dispatch'
    environment:
      name: pypi
      url: https://pypi.org/p/sqlitegraph
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
